<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Options</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #252525;
      --border: #333;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #6d9eeb;
      --accent-hover: #8ab4f8;
      --danger: #e57373;
      --radius: 8px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header p { font-size: 13px; color: var(--muted); margin-top: 3px; }

    main { padding: 24px; max-width: 560px; }

    .section { margin-bottom: 28px; }
    .section h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; margin-bottom: 5px; }
    .field input[type="number"],
    .field input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .toggle-field { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .toggle-field label { font-size: 13px; cursor: pointer; flex: 1; }
    .toggle-field input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }

    .actions { display: flex; gap: 10px; margin-top: 24px; }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: rgba(229,115,115,0.1); }

    #status-bar {
      font-size: 12px;
      color: var(--muted);
      padding: 8px 24px;
      border-top: 1px solid var(--border);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status-bar .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
    }
    #status-bar .dot.connected { background: #81c995; }

    #custom-fields { /* populated by JS */ }
  </style>
</head>
<body>
  <header>
    <h1 id="app-name">Options</h1>
    <p id="app-description"></p>
  </header>

  <main>
    <div class="section">
      <h2>Timing</h2>
      <div class="field">
        <label for="starts-in">Activate after (minutes)</label>
        <input type="number" id="starts-in" min="0.1" max="1440" step="0.1" value="5" />
        <div class="hint">Minutes of inactivity before the screensaver starts</div>
      </div>
      <div class="field">
        <label for="display-off">Display off after (minutes)</label>
        <input type="number" id="display-off" min="0.5" max="1440" step="0.5" value="10" />
        <div class="hint">Minutes before the display turns off (0.5 minimum)</div>
      </div>
      <div class="field">
        <label for="require-pass-in">Require password after (minutes, 0 = disabled)</label>
        <input type="number" id="require-pass-in" min="0" max="1440" step="1" value="0" />
        <div class="hint">Lock the system after this many minutes (0 disables locking)</div>
      </div>
    </div>

    <div class="section">
      <h2>Power</h2>
      <div class="toggle-field">
        <input type="checkbox" id="run-on-battery" />
        <label for="run-on-battery">Run on battery power</label>
      </div>
    </div>

    <div class="section">
      <h2>Developer</h2>
      <div class="toggle-field">
        <input type="checkbox" id="debug-mode" />
        <label for="debug-mode">Debug mode (loads debug screensaver URL)</label>
      </div>
    </div>

    <!-- Fork-defined custom fields are rendered here by JS -->
    <div id="custom-fields"></div>

    <div class="actions">
      <button class="btn-primary" id="save-btn" type="button">Save</button>
      <button class="btn-secondary" id="preview-btn" type="button">Preview</button>
      <button class="btn-danger" id="reset-btn" type="button">Reset to defaults</button>
    </div>
  </main>

  <div id="status-bar">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Connecting…</span>
  </div>

  <!-- Register service worker for offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

  <!-- liminal-api — use CDN or local dist -->
  <script src="../../dist/liminal-api.global.js"></script>
  <!-- Reference main.js (compiled from main.ts via `bun run build`) -->
  <script type="module" src="./main.js"></script>
</body>
</html>
